name: Bump Version and Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

  bump-version:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Bump version
        id: version
        run: |
          # Analyze commit messages to determine bump type
          # Default to patch
          BUMP_TYPE="patch"
          
          # Check the commits since the last tag/bump
          if git log -1 --pretty=%B | grep -qE "^(BREAKING CHANGE|feat!)"; then
            BUMP_TYPE="major"
          elif git log -1 --pretty=%B | grep -qE "^feat"; then
            BUMP_TYPE="minor"
          fi
          
          echo "Bumping $BUMP_TYPE version..."
          npm version $BUMP_TYPE -m "chore(release): %s [skip ci]"
          
          # Extract the new version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Created version v$NEW_VERSION"

      - name: Push changes and tags
        run: |
          git push origin main
          git push origin --tags

  render-auto-deploy:
    needs: bump-version
    runs-on: ubuntu-latest

    steps:
      - name: Note Render static-site auto deploy
        run: |
          echo "Render Static Site auto-deploys from the main branch."
          echo "Version ${{ needs.bump-version.outputs.new_version }} is now available for Render to build automatically."
